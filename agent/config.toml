# Zero-Day Evaluation Config
# Run from the sageagent-ctf project root so project_relative_dockerfile_path resolves.

DEFAULT_IMAGE = "kalilinux/kali-rolling"
TASK_NAME = "ctf_task"
ABSOLUTE_SHARED_DATA_PATH = ""
HOST_LONG_TERM_MEM_DIR = "/tmp/opensage_ctf_long_term_mem"
HOST_SHORT_TERM_MEM_DIR = "/tmp/opensage_ctf_short_term_mem"
MAIN_MODEL = "anthropic/claude-sonnet-4-5-20250929"
GDB_PORT = 1111

task_name = "${TASK_NAME}"
src_dir_in_sandbox = "/shared/code"
default_host = ""

[sandbox]
backend = "native"
absolute_shared_data_path = "${ABSOLUTE_SHARED_DATA_PATH}"
host_shared_mem_dir = "${HOST_LONG_TERM_MEM_DIR}"
# mount_host_paths = [
#     "${HOST_SHORT_TERM_MEM_DIR}:/mem:rw",
# ]

[sandbox.sandboxes.main]
image = "${TASK_NAME}_main"
project_relative_dockerfile_path = "agent/main_sandbox/Dockerfile"
timeout = 600
[sandbox.sandboxes.main.build_args]
BASE_IMAGE = "${DEFAULT_IMAGE}"
[sandbox.sandboxes.main.extra]
initializer_timeout_sec = 1800

# GDB MCP sandbox configuration
[sandbox.sandboxes.gdb_mcp]
image = "${TASK_NAME}_gdb_mcp"
project_relative_dockerfile_path = "src/opensage/templates/dockerfiles/gdb_mcp/Dockerfile"
command = ""
mcp_services = ["gdb_mcp"]
[sandbox.sandboxes.gdb_mcp.build_args]
BASE_IMAGE = "${DEFAULT_IMAGE}"
[sandbox.sandboxes.gdb_mcp.ports]
"1111/tcp" = "${GDB_PORT}"
[sandbox.sandboxes.gdb_mcp.extra]
initializer_timeout_sec = 1800

[llm]
[llm.model_configs.main]
model_name = "${MAIN_MODEL}"
temperature = 0.7
rpm = 60
tpm = 60000

[history]
max_tool_response_length = 20000

[history.events_compaction]
max_history_summary_length = 300000

[mcp]
# GDB MCP service configuration
[mcp.services.gdb_mcp]
sse_port = "${GDB_PORT}"


[plugins]
enabled = [
    "history_summarizer_plugin",
    "tool_response_summarizer_plugin",
    "message_board_diff_plugin",
]
